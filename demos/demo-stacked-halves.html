<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo: Stacked Halves</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; }

  .half {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: flex 0.3s ease;
    text-decoration: none;
  }
  .half:hover { flex: 1.2; }

  .dev {
    background: #1a1a1a;
    color: #f0f0f0;
  }
  .creative {
    background: #f5e6d3;
    color: #2a1a0e;
  }

  .label {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .sublabel {
    font-size: 0.75rem;
    opacity: 0.6;
    letter-spacing: 0.05em;
  }
  .arrow { font-size: 1.2rem; opacity: 0.4; margin-top: 4px; }
</style>
</head>
<body>

<a class="half dev" href="#">
  <div class="label">Software</div>
  <div class="sublabel">dev work & open source</div>
  <div class="arrow">↓</div>
</a>

<a class="half creative" href="#">
  <div class="label">Creative</div>
  <div class="sublabel">dance & queer art</div>
  <div class="arrow">↓</div>
</a>

</body>
</html>
