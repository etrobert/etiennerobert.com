<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo: Peek</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; height: 100dvh; overflow: hidden; position: relative; }

  .panel {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: top 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  .dev {
    background: #1a1a1a;
    color: #f0f0f0;
    top: 0;
    height: 80dvh;
    border-radius: 0 0 24px 24px;
    z-index: 2;
  }
  .dev.peeked { top: -65dvh; height: 80dvh; }

  .creative {
    background: #f5e6d3;
    color: #2a1a0e;
    bottom: 0;
    height: 100dvh;
    top: 78dvh;
    z-index: 1;
    justify-content: flex-start;
    padding-top: 28px;
  }
  .creative.expanded { top: 20dvh; }

  h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
  p { font-size: 0.82rem; opacity: 0.55; }

  .peek-label {
    position: absolute;
    bottom: 20px;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.5;
  }
  .handle {
    width: 40px; height: 4px;
    background: currentColor;
    border-radius: 2px;
    opacity: 0.3;
    margin-bottom: 8px;
  }

  .back-btn {
    position: absolute;
    top: 16px;
    left: 20px;
    background: none;
    border: none;
    color: #f5e6d3;
    font-size: 0.85rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 0.05em;
  }
  .back-btn.visible { opacity: 0.6; }
</style>
</head>
<body>

<div class="panel creative" id="creative" onclick="expand()">
  <div class="handle"></div>
  <h1>Creative</h1>
  <p>dance & queer art</p>
</div>

<div class="panel dev" id="dev" onclick="peek()">
  <h1>Software</h1>
  <p>dev work & open source</p>
  <div class="peek-label">↑ Creative</div>
  <button class="back-btn" id="back-btn" onclick="unpeel(event)">← back</button>
</div>

<script>
const dev = document.getElementById('dev');
const creative = document.getElementById('creative');
const backBtn = document.getElementById('back-btn');
let expanded = false;

function peek() {
  if (expanded) return;
  expanded = true;
  dev.classList.add('peeked');
  creative.classList.add('expanded');
  backBtn.classList.add('visible');
  dev.onclick = null;
  creative.onclick = null;
}

function unpeel(e) {
  e.stopPropagation();
  expanded = false;
  dev.classList.remove('peeked');
  creative.classList.remove('expanded');
  backBtn.classList.remove('visible');
  setTimeout(() => {
    dev.onclick = peek;
  }, 450);
}

function expand() {}
</script>
</body>
</html>
