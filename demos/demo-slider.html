<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo: Slider</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; height: 100dvh; overflow: hidden; user-select: none; }

  .container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .panel {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    overflow: hidden;
  }

  .dev {
    left: 0;
    width: 50%;
    background: #1a1a1a;
    color: #f0f0f0;
  }

  .creative {
    right: 0;
    width: 50%;
    background: #f5e6d3;
    color: #2a1a0e;
  }

  /* Pin content to center of full viewport so it stays centered as panels resize */
  .panel-inner {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    top: 0; bottom: 0;
  }
  .dev .panel-inner { left: 0; width: 100vw; }
  .creative .panel-inner { right: 0; width: 100vw; }

  h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
  p { font-size: 0.82rem; opacity: 0.5; letter-spacing: 0.04em; }

  .handle {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: col-resize;
    z-index: 10;
  }

  .handle-line {
    width: 3px;
    height: 100%;
    background: #fff;
    opacity: 0.6;
    position: absolute;
  }

  .handle-grip {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: #555;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="container" id="container">
  <div class="panel dev" id="dev-panel">
    <div class="panel-inner">
      <h1>Software</h1>
      <p>dev work & open source</p>
    </div>
  </div>

  <div class="panel creative" id="creative-panel">
    <div class="panel-inner">
      <h1>Creative</h1>
      <p>dance & queer art</p>
    </div>
  </div>

  <div class="handle" id="handle">
    <div class="handle-line"></div>
    <div class="handle-grip">⇔</div>
  </div>
</div>

<script>
  const container = document.getElementById('container');
  const devPanel = document.getElementById('dev-panel');
  const creativePanel = document.getElementById('creative-panel');
  const handle = document.getElementById('handle');

  let dragging = false;

  function setPosition(clientX) {
    const rect = container.getBoundingClientRect();
    let pct = (clientX - rect.left) / rect.width;
    pct = Math.max(0.1, Math.min(0.9, pct));
    const pctPx = (pct * 100).toFixed(2) + '%';
    devPanel.style.width = pctPx;
    creativePanel.style.width = (100 - pct * 100).toFixed(2) + '%';
    handle.style.left = pctPx;
  }

  handle.addEventListener('mousedown', () => dragging = true);
  window.addEventListener('mouseup', () => dragging = false);
  window.addEventListener('mousemove', e => { if (dragging) setPosition(e.clientX); });

  handle.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); }, { passive: false });
  window.addEventListener('touchend', () => dragging = false);
  window.addEventListener('touchmove', e => {
    if (dragging) setPosition(e.touches[0].clientX);
  }, { passive: true });
</script>

</body>
</html>
